<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Philosophy AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --sidebar: #111111;
  --hover: #1a1a1a;
  --active: #222222;
  --border: #2a2a2a;
  --text: #ececec;
  --muted: #8e8e8e;
  --muted2: #555;
  --accent: #10a37f;
  --user-bubble: #2a2a2a;
  --input-bg: #1a1a1a;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; height:-webkit-fill-available; }
body {
  font-family:'Inter',sans-serif;
  background:var(--bg); color:var(--text);
  display:flex; width:100vw;
  height:100vh; height:100dvh;
  overflow:hidden; position:fixed; inset:0;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* SIDEBAR */
#sidebar {
  width:260px; flex-shrink:0;
  background:var(--sidebar);
  display:flex; flex-direction:column;
  border-right:1px solid var(--border);
  position:relative; z-index:20;
  transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
}
@media(max-width:640px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);box-shadow:6px 0 24px rgba(0,0,0,0.7);}
  #sidebar.open{transform:translateX(0);}
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:15;backdrop-filter:blur(2px);}
  #overlay.show{display:block;}
}
.sb-top{padding:14px 12px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.sb-row{display:flex;align-items:center;gap:8px;}
.sb-brand{flex:1;font-size:15px;font-weight:600;color:var(--text);}
.icon-btn{width:36px;height:36px;border-radius:8px;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background 0.15s,color 0.15s;}
.icon-btn:hover,.icon-btn:active{background:var(--hover);color:var(--text);}
#new-chat-btn-sb{width:100%;background:none;border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.15s;}
#new-chat-btn-sb:hover,#new-chat-btn-sb:active{background:var(--hover);}
.sb-search{position:relative;margin:0 12px 6px;flex-shrink:0;}
.sb-search input{width:100%;background:var(--hover);border:1px solid var(--border);border-radius:9px;padding:8px 12px 8px 32px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);outline:none;}
.sb-search input::placeholder{color:var(--muted2);}
.sb-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted2);pointer-events:none;}
.sb-section{padding:10px 16px 4px;font-size:11px;color:var(--muted2);font-weight:500;flex-shrink:0;}
#chat-list{flex:1;overflow-y:auto;padding:2px 8px 12px;}
#chat-list::-webkit-scrollbar{width:3px;}
#chat-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.chat-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:background 0.12s;margin-bottom:1px;user-select:none;}
.chat-item:hover{background:var(--hover);}
.chat-item.active{background:var(--active);}
.chat-item.pressed{background:var(--active);transform:scale(0.98);}
.ci-icon{font-size:14px;flex-shrink:0;color:var(--muted);}
.chat-item.active .ci-icon{color:var(--text);}
.ci-info{flex:1;min-width:0;}
.ci-title{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.chat-item.active .ci-title{color:var(--text);font-weight:500;}
.ci-meta{font-size:10px;color:var(--muted2);margin-top:1px;}
.no-chats{text-align:center;padding:24px 12px;color:var(--muted2);font-size:12px;line-height:1.8;}

/* CONTEXT MENU */
#ctx-menu{display:none;position:fixed;background:#1e1e1e;border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:999;min-width:170px;box-shadow:0 8px 30px rgba(0,0,0,0.7);}
#ctx-menu.show{display:block;animation:ctxPop 0.16s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes ctxPop{from{opacity:0;transform:scale(0.88);}to{opacity:1;transform:scale(1);}}
.ctx-item{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:13px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid var(--border);font-family:'Inter',sans-serif;}
.ctx-item:last-child{border-bottom:none;}
.ctx-item:hover,.ctx-item:active{background:var(--hover);}
.ctx-item.danger{color:#f87171;}
.ctx-item.safe{color:#34d399;}

/* RENAME MODAL */
#rename-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#rename-modal.show{display:flex;}
.modal-box{background:#1a1a1a;border:1px solid var(--border);border-radius:16px;padding:22px 20px;width:88%;max-width:320px;box-shadow:0 12px 40px rgba(0,0,0,0.8);animation:ctxPop 0.18s cubic-bezier(0.34,1.56,0.64,1) both;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;}
#rename-input{width:100%;background:var(--hover);border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;margin-bottom:12px;transition:border-color 0.2s;}
#rename-input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;padding:10px;border-radius:9px;border:none;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;font-weight:500;transition:opacity 0.15s;}
.modal-btn.confirm{background:var(--accent);color:#fff;}
.modal-btn.cancel{background:var(--hover);color:var(--muted);border:1px solid var(--border);}
.modal-btn:hover{opacity:0.85;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;z-index:1;}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
#menu-btn{display:none;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;}
@media(max-width:640px){#menu-btn{display:flex;align-items:center;}}
#chat-title-display{flex:1;font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 2.5s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:2px;}
#messages::-webkit-scrollbar{width:4px;}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:32px 20px;gap:8px;animation:fadeUp 0.4s ease;}
.welcome-logo{font-size:44px;margin-bottom:8px;animation:floatOrb 4s ease-in-out infinite;}
@keyframes floatOrb{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.welcome h2{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-0.02em;margin-bottom:4px;}
.welcome p{color:var(--muted);font-size:13px;max-width:280px;line-height:1.6;}
.action-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px;}
.chip{display:flex;align-items:center;gap:7px;background:var(--sidebar);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;cursor:pointer;transition:background 0.15s,border-color 0.15s;color:var(--text);font-family:'Inter',sans-serif;}
.chip:hover,.chip:active{background:var(--hover);border-color:var(--muted2);}
.chip-icon{font-size:16px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.msg-row{padding:8px 16px;display:flex;gap:12px;max-width:800px;margin:0 auto;width:100%;}
.msg-row.user{flex-direction:row-reverse;}
.msg-row.new-msg{animation:fadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both;}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;align-self:flex-start;margin-top:3px;}
.msg-row.user .msg-avatar{background:#3a3a5c;}
.msg-row.bot .msg-avatar{background:#1a3a2a;}
.msg-bubble{max-width:78%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.msg-row.user .msg-bubble{background:var(--user-bubble);color:var(--text);border-bottom-right-radius:4px;}
.msg-row.bot .msg-bubble{background:transparent;color:var(--text);padding-left:0;border-bottom-left-radius:4px;}
.gen-img{max-width:280px;border-radius:14px;margin-top:4px;display:block;border:1px solid var(--border);}

.typing-row{padding:8px 16px;display:flex;gap:12px;max-width:800px;margin:0 auto;width:100%;}
.typing-dots{display:flex;gap:5px;align-items:center;padding:12px 4px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.18s;}
.dot:nth-child(3){animation-delay:0.36s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-6px);opacity:1;}}

/* INPUT */
#input-wrap{padding:10px 16px 14px;background:var(--bg);flex-shrink:0;}
.input-box{max-width:800px;margin:0 auto;background:var(--input-bg);border:1px solid var(--border);border-radius:16px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;transition:border-color 0.2s;}
.input-box:focus-within{border-color:#444;}
#user-input{background:none;border:none;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);resize:none;outline:none;max-height:140px;min-height:24px;line-height:1.5;width:100%;}
#user-input::placeholder{color:var(--muted2);}
.input-actions{display:flex;align-items:center;justify-content:space-between;}
.input-left{display:flex;gap:6px;flex-wrap:wrap;}
.pill-btn{display:flex;align-items:center;gap:5px;background:var(--hover);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
.pill-btn:hover,.pill-btn:active{background:#2a2a2a;color:var(--text);}
.pill-btn span{font-size:13px;}
#send-btn{width:34px;height:34px;border-radius:9px;background:var(--muted2);border:none;color:#000;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0;}
#send-btn.active{background:var(--text);}
#send-btn:disabled{opacity:0.25;cursor:not-allowed;}
.input-hint{text-align:center;font-size:11px;color:var(--muted2);margin:8px auto 0;max-width:800px;}
.error-msg{text-align:center;padding:10px 16px;color:#f87171;font-size:13px;animation:fadeUp 0.3s ease;}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="ctx-menu">
  <div class="ctx-item safe" onclick="ctxRename()"><span>✏️</span> Rename</div>
  <div class="ctx-item danger" onclick="ctxDelete()"><span>🗑️</span> Delete</div>
</div>

<div id="rename-modal">
  <div class="modal-box">
    <div class="modal-title">Rename Chat</div>
    <input id="rename-input" type="text" placeholder="Chat name..." maxlength="60">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeRename()">Cancel</button>
      <button class="modal-btn confirm" onclick="confirmRename()">Save</button>
    </div>
  </div>
</div>

          <button class="pill-btn" onclick="quickSend('Surprise me with something interesting')"><span>🎲</span> Surprise me</button>

        </div>

      </div>

<script>
const STORAGE_KEY='phiai_v2';
const load=()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return{};}};
const save=d=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}};

let allChats=load(), activeChatId=null, isThinking=false;

const SYSTEM_PROMPT=`You are Philosophy AI — a sharp, intelligent assistant created by Frya Fatih, one of the youngest coders.

RESPONSE STYLE:
- Short and direct. Simple question = short answer. No filler words.
- Plain conversational sentences. Like texting a smart friend.
- Only go long if genuinely needed.

IDENTITY:
- You are Philosophy AI. Not Claude, not GPT.
- Creator: "Frya Fatih — one of the youngest coders."

IMAGE GENERATION:
- If the user wants an image generated/created/drawn, respond ONLY with this on its own line:
  [IMAGE: vivid detailed description]
- Nothing else before or after that line.

SEARCH:
- Use web_search for anything current: news, weather, prices, sports, events.`;

// SIDEBAR
const toggleSidebar=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');};
const closeSidebar=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');};

// CHATS
const genId=()=>'c'+Date.now()+Math.random().toString(36).slice(2,5);

function newChat(){
  const id=genId();
  allChats[id]={id,title:'New Chat',messages:[],createdAt:Date.now(),updatedAt:Date.now()};
  save(allChats); switchToChat(id); closeSidebar();
}

function switchToChat(id){
  activeChatId=id;
  document.getElementById('chat-title-display').textContent=allChats[id]?.title||'Philosophy AI';
  renderChatList(); renderMessages(); closeSidebar();
}

function autoTitle(id,msg){
  allChats[id].title=msg.length>40?msg.slice(0,37)+'...':msg;
  save(allChats);
  document.getElementById('chat-title-display').textContent=allChats[id].title;
  renderChatList();
}

function filterChats(q){
  document.querySelectorAll('.chat-item').forEach(el=>{
    el.style.display=el.querySelector('.ci-title')?.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

// RENDER LIST
function renderChatList(){
  const list=document.getElementById('chat-list');
  const ids=Object.keys(allChats).sort((a,b)=>allChats[b].updatedAt-allChats[a].updatedAt);
  if(!ids.length){list.innerHTML='<div class="no-chats">No chats yet.<br>Hit ✏️ to start.</div>';return;}
  list.innerHTML=ids.map(id=>{
    const c=allChats[id],d=new Date(c.updatedAt),now=new Date();
    const ds=d.toDateString()===now.toDateString()?d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString([],{month:'short',day:'numeric'});
    return`<div class="chat-item${id===activeChatId?' active':''}" data-id="${id}"><span class="ci-icon">💬</span><div class="ci-info"><div class="ci-title">${esc(c.title)}</div><div class="ci-meta">${c.messages.length} msg · ${ds}</div></div></div>`;
  }).join('');

  list.querySelectorAll('.chat-item').forEach(el=>{
    const id=el.dataset.id;
    let timer=null,didLong=false;
    const start=e=>{didLong=false;el.classList.add('pressed');timer=setTimeout(()=>{didLong=true;el.classList.remove('pressed');openCtx(id,e);},480);};
    const end=()=>{clearTimeout(timer);el.classList.remove('pressed');};
    const tap=()=>{if(!didLong)switchToChat(id);};
    el.addEventListener('touchstart',start,{passive:true});
    el.addEventListener('touchend',()=>{end();tap();});
    el.addEventListener('touchmove',end,{passive:true});
    el.addEventListener('mousedown',start);
    el.addEventListener('mouseup',()=>{end();tap();});
    el.addEventListener('mouseleave',end);
    el.addEventListener('contextmenu',e=>e.preventDefault());
  });
}

const esc=t=>t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// CONTEXT MENU
let ctxId=null;
const ctxMenu=document.getElementById('ctx-menu');
function openCtx(id,e){
  ctxId=id;
  const t=e.touches?e.touches[e.touches.length-1]:e;
  const x=Math.min(t.clientX||t.pageX,window.innerWidth-180);
  const y=Math.min(t.clientY||t.pageY,window.innerHeight-105);
  ctxMenu.style.cssText=`left:${x}px;top:${y}px;`;
  ctxMenu.classList.add('show');
  setTimeout(()=>{
    document.addEventListener('touchstart',closeCtxOut,{once:true,passive:true});
    document.addEventListener('mousedown',closeCtxOut,{once:true});
  },50);
}
const closeCtxOut=e=>{if(!ctxMenu.contains(e.target))closeCtx();};
const closeCtx=()=>ctxMenu.classList.remove('show');
const ctxDelete=()=>{closeCtx();if(ctxId)deleteChat(ctxId);};
function ctxRename(){
  closeCtx();if(!ctxId)return;
  document.getElementById('rename-input').value=allChats[ctxId]?.title||'';
  document.getElementById('rename-modal').classList.add('show');
  setTimeout(()=>document.getElementById('rename-input').focus(),150);
}
const closeRename=()=>document.getElementById('rename-modal').classList.remove('show');
function confirmRename(){
  const v=document.getElementById('rename-input').value.trim();
  if(v&&ctxId&&allChats[ctxId]){
    allChats[ctxId].title=v; save(allChats);
    if(ctxId===activeChatId)document.getElementById('chat-title-display').textContent=v;
    renderChatList();
  }
  closeRename();
}
document.getElementById('rename-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmRename();if(e.key==='Escape')closeRename();});
document.getElementById('rename-modal').addEventListener('click',e=>{if(e.target===document.getElementById('rename-modal'))closeRename();});

function deleteChat(id){
  delete allChats[id]; save(allChats);
  if(activeChatId===id){
    const ids=Object.keys(allChats).sort((a,b)=>allChats[b].updatedAt-allChats[a].updatedAt);
    if(ids.length)switchToChat(ids[0]);
    else{activeChatId=null;document.getElementById('chat-title-display').textContent='Philosophy AI';renderMessages();}
  }
  renderChatList();
}

// MESSAGES
function renderMessages(){
  const el=document.getElementById('messages'); el.innerHTML='';
  if(!activeChatId||!allChats[activeChatId]?.messages.length){el.appendChild(buildWelcome());return;}
  allChats[activeChatId].messages.forEach(m=>el.appendChild(buildMsg(m.role,m.content,m.isImage,false)));

function buildMsg(role,content,isImage=false,isNew=false){
  const row=document.createElement('div');
  row.className=`msg-row ${role}${isNew?' new-msg':''}`;
  const av=document.createElement('div');av.className='msg-avatar';av.textContent=role==='user'?'👤':'🧠';
  const bubble=document.createElement('div');bubble.className='msg-bubble';
  if(isImage&&role==='bot'){
    const img=document.createElement('img');img.className='gen-img';img.src=content;img.alt='Generated image';
    img.onerror=()=>{bubble.textContent='Image generation failed. Try a different description.';};
    bubble.appendChild(img);
  } else {bubble.textContent=content;}
  row.appendChild(av);row.appendChild(bubble);return row;
}

function quickSend(t){
  const inp=document.getElementById('user-input');
  inp.value=t;inp.dispatchEvent(new Event('input'));
  sendMessage();
}

const removeTyping=()=>{const t=document.getElementById('typing-ind');if(t)t.remove();};
const scrollBot=()=>{const e=document.getElementById('messages');e.scrollTop=e.scrollHeight;};
function showErr(msg){
  removeTyping();
  const e=document.createElement('div');e.className='error-msg';e.textContent='⚠ '+msg;
  document.getElementById('messages').appendChild(e);
  setTimeout(()=>e.remove(),5000);scrollBot();
}


// SEND
async function sendMessage(){
  const inp=document.getElementById('user-input');
  const text=inp.value.trim();
  if(!text||isThinking)return;
  if(!activeChatId)newChat();

  isThinking=true;
  document.getElementById('send-btn').disabled=true;
  inp.value='';inp.style.height='auto';updateSendBtn();

  const chat=allChats[activeChatId];
  const isFirst=!chat.messages.length;
  chat.messages.push({role:'user',content:text});
  chat.updatedAt=Date.now();
  if(isFirst)autoTitle(activeChatId,text);
  save(allChats);

  const msgEl=document.getElementById('messages');
  const w=msgEl.querySelector('.welcome');if(w)w.remove();
  msgEl.appendChild(buildMsg('user',text,false,true));
  showTyping();
  try{
    const apiMsgs=chat.messages.map(m=>({role:m.role,content:m.content}));
    const resp=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer YOUR_DEEPSEEK_KEY_HERE'},
      body:JSON.stringify({
        model:'deepseek-chat',
        max_tokens:1000,
        
        
        messages:[{role:'system',content:SYSTEM_PROMPT},...apiMsgs]
      })
    });
    if(!resp.ok){const e=await resp.json().catch(()=>{});throw new Error(e?.error?.message||`HTTP ${resp.status}`);}
    const data=await resp.json();
    const reply=data.choices?.[0]?.message?.content?.trim();
    removeTyping();
    const botReply=reply||"Couldn't find an answer. Try rephrasing?";
    chat.messages.push({role:'assistant',content:botReply});
    chat.updatedAt=Date.now();save(allChats);
    msgEl.appendChild(buildMsg('bot',botReply,false,true));
    renderChatList();scrollBot();
  }catch(err){
    chat.messages.pop();save(allChats);
    showErr('Something went wrong. Try again.');
  }finally{
    isThinking=false;
    document.getElementById('send-btn').disabled=false;
    updateSendBtn();inp.focus();
  }
}

// INPUT
const inp=document.getElementById('user-input');
function updateSendBtn(){
  const btn=document.getElementById('send-btn');
  const has=inp.value.trim().length>0;
  btn.classList.toggle('active',has);
  if(!isThinking)btn.disabled=!has;
}
inp.addEventListener('input',()=>{
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,140)+'px';
  updateSendBtn();
});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

// INIT
function init(){
  const ids=Object.keys(allChats).sort((a,b)=>allChats[b].updatedAt-allChats[a].updatedAt);
  if(ids.length){activeChatId=ids[0];document.getElementById('chat-title-display').textContent=allChats[ids[0]].title;}
  renderChatList();renderMessages();
  setTimeout(()=>inp.focus(),300);
}
init();
</script>
